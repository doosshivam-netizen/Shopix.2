           <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { 
  getFirestore, 
  collection, 
  getDocs 
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyBa2yg_3UYg43uFmaSCH-VKiXXN7f5WBGg",
  authDomain: "shopix-ec11c.firebaseapp.com",
  projectId: "shopix-ec11c",
  storageBucket: "shopix-ec11c.firebasestorage.app",
  messagingSenderId: "750936730906",
  appId: "1:750936730906:web:903be3e740746612f710a3",
  measurementId: "G-3P7ZWT1PXG"
};

// Init Firebase
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Load Products
async function loadProducts() {
  const container = document.querySelector(".products-grid");

  // Show skeleton loading
  container.innerHTML = `
    <div class="skeleton-grid">
      <div class="skeleton-card">
        <div class="skeleton-img"></div>
        <div class="skeleton-text"></div>
        <div class="skeleton-text short"></div>
      </div>
    </div>
  `;

  try {
    const querySnapshot = await getDocs(collection(db, "products"));

    if (querySnapshot.empty) {
      container.innerHTML = "😢 No products found";
      return;
    }

    container.innerHTML = "";

    querySnapshot.forEach((doc) => {
      const p = doc.data();

      container.innerHTML += `
        <div class="product-card">
          
          <div class="product-img">
            ${p.image || "🛍️"}
          </div>

          <div class="product-info">
            <div class="product-brand">${p.brand || "Brand"}</div>

            <div class="product-name">
              ${p.name || "Product Name"}
            </div>

            <div class="price-row">
              <div class="price-main">₹${p.price || 0}</div>
              <div class="price-orig">₹${p.original || p.price || 0}</div>
              <div class="price-off">🔥 ${p.discount || "10%"} OFF</div>
            </div>

            <button class="add-cart-btn" onclick="addToCart('${doc.id}')">
              <i class="fas fa-cart-plus"></i> Add to Cart
            </button>
          </div>
        </div>
      `;
    });

};

// Init Firebase
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// Load Products
async function loadProducts() {
  const container = document.querySelector(".products-grid");

  // Show skeleton loading
  container.innerHTML = `
    <div class="skeleton-grid">
      <div class="skeleton-card">
        <div class="skeleton-img"></div>
        <div class="skeleton-text"></div>
        <div class="skeleton-text short"></div>
      </div>
    </div>
  `;

  try {
    const querySnapshot = await getDocs(collection(db, "products"));

    if (querySnapshot.empty) {
      container.innerHTML = "😢 No products found";
      return;
    }

    container.innerHTML = "";

    querySnapshot.forEach((doc) => {
      const p = doc.data();

      container.innerHTML += `
        <div class="product-card">
          
          <div class="product-img">
            ${p.image || "🛍️"}
          </div>

          <div class="product-info">
            <div class="product-brand">${p.brand || "Brand"}</div>

            <div class="product-name">
              ${p.name || "Product Name"}
            </div>

            <div class="price-row">
              <div class="price-main">₹${p.price || 0}</div>
              <div class="price-orig">₹${p.original || p.price || 0}</div>
              <div class="price-off">🔥 ${p.discount || "10%"} OFF</div>
            </div>

            <button class="add-cart-btn" onclick="addToCart('${doc.id}')">
              <i class="fas fa-cart-plus"></i> Add to Cart
            </button>
          </div>
        </div>
      `;
    });

  } catch (err) {
    console.error(err);
    container.innerHTML = "❌ Error loading products";
  }
}

window.addToCart = function(id) {
  alert("🛒 Product added to cart: " + id);
};

// Load on start
loadProducts();
</script>
